<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angol Beszédfordulatok Kvíz</title>
<style>
:root {
  --blue-dark:#0C447C;
  --blue-mid:#185FA5;
  --blue-light:#378ADD;
  --blue-pale:#E6F1FB;
  --blue-border:#B5D4F4;
  --amber:#FAC775;
  --green-bg:#EAF3DE;
  --green-border:#639922;
  --green-text:#27500A;
  --red-bg:#FCEBEB;
  --red-border:#E24B4A;
  --red-text:#791F1F;
  --gray-bg:#F1EFE8;
  --gray-border:#D3D1C7;
  --gray-text:#2C2C2A;
  --radius-lg:20px;
  --radius-pill:99px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

html { font-size:16px; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(160deg,#e8f2fb 0%,#f5f0ff 100%);
  min-height:100vh;
  min-height:100dvh;
  padding:clamp(1rem,3vw,2rem) clamp(0.75rem,4vw,1.5rem) clamp(2rem,5vw,3rem);
}

.wrap {
  max-width:580px;
  margin:0 auto;
  width:100%;
}

/* ── Header ── */
.top-header {
  text-align:center;
  margin-bottom:clamp(1rem,3vw,1.5rem);
  padding:clamp(1.1rem,3vw,1.5rem) 1rem clamp(1rem,2.5vw,1.25rem);
  background:#fff;
  border-radius:var(--radius-lg);
  border:1px solid var(--blue-border);
}
.top-header img {
  width:clamp(70px,18vw,100px);
  display:inline-block;
  height:auto;
}
.top-header .sub {
  font-size:clamp(18px,5vw,24px);
  color:var(--blue-dark);
  letter-spacing:0.01em;
  font-weight:700;
  margin-top:10px;
}

/* ── Score bar ── */
.score-bar {
  background:var(--blue-mid);
  border-radius:clamp(14px,3vw,18px);
  padding:clamp(0.75rem,2.5vw,1rem) clamp(1rem,4vw,1.5rem);
  margin-bottom:clamp(0.9rem,2.5vw,1.25rem);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
}
.score-bar .side { display:flex; flex-direction:column; gap:2px; }
.score-bar .lbl { font-size:clamp(10px,2.5vw,12px); color:#B5D4F4; letter-spacing:0.1em; text-transform:uppercase; }
.score-bar .val { font-size:clamp(24px,6vw,30px); font-weight:700; color:var(--amber); line-height:1; }
.score-bar .sub-val { font-size:clamp(10px,2.5vw,12px); color:#B5D4F4; }
.score-bar .divider { width:1px; height:clamp(30px,8vw,44px); background:rgba(255,255,255,0.2); flex-shrink:0; }

/* ── Progress ── */
.prog-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:clamp(0.75rem,2vw,1rem);
}
.prog-bg { flex:1; height:10px; background:var(--gray-border); border-radius:var(--radius-pill); overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--blue-mid),var(--blue-light)); border-radius:var(--radius-pill); transition:width 0.5s cubic-bezier(.4,0,.2,1); }
.prog-label { font-size:clamp(11px,2.5vw,13px); color:#5F5E5A; white-space:nowrap; font-weight:600; min-width:2.5rem; text-align:right; }

/* ── Streak ── */
.streak {
  text-align:center;
  font-size:clamp(12px,3vw,14px);
  color:#854F0B;
  background:#FAEEDA;
  border:1.5px solid var(--amber);
  border-radius:var(--radius-pill);
  padding:clamp(5px,1.5vw,7px) 20px;
  margin-bottom:clamp(0.75rem,2vw,1rem);
  font-weight:600;
  display:none;
}

/* ── Question card ── */
.q-card {
  background:#fff;
  border:1.5px solid var(--blue-border);
  border-radius:var(--radius-lg);
  padding:clamp(1.25rem,4vw,2rem) clamp(1rem,4vw,1.5rem);
  margin-bottom:clamp(0.75rem,2vw,1rem);
  box-shadow:0 3px 0 var(--blue-border);
}
.q-type-badge {
  display:inline-block;
  background:var(--blue-mid);
  color:#fff;
  font-size:clamp(10px,2.5vw,12px);
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:clamp(4px,1vw,6px) clamp(12px,3vw,18px);
  border-radius:var(--radius-pill);
  margin-bottom:clamp(10px,3vw,16px);
}
.q-text {
  font-size:clamp(20px,5.5vw,28px);
  font-weight:700;
  color:var(--blue-dark);
  margin-bottom:6px;
  line-height:1.25;
}
.q-hint {
  font-size:clamp(13px,3vw,15px);
  color:var(--blue-light);
  margin-bottom:clamp(1rem,3vw,1.5rem);
  font-weight:500;
}

/* ── Options ── */
.options { display:flex; flex-direction:column; gap:clamp(8px,2vw,10px); }
.opt {
  background:var(--gray-bg);
  border:2px solid var(--gray-border);
  border-radius:clamp(10px,2.5vw,14px);
  padding:clamp(12px,3vw,15px) clamp(14px,4vw,18px);
  font-size:clamp(15px,4vw,17px);
  color:var(--gray-text);
  cursor:pointer;
  text-align:left;
  transition:all 0.15s;
  font-family:inherit;
  font-weight:500;
  line-height:1.3;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.opt:hover:not(:disabled) { background:var(--blue-pale); border-color:var(--blue-light); color:var(--blue-dark); }
.opt:active:not(:disabled) { transform:scale(0.98); }
.opt.correct { background:var(--green-bg); border-color:var(--green-border); color:var(--green-text); font-weight:600; }
.opt.wrong   { background:var(--red-bg);   border-color:var(--red-border);   color:var(--red-text); }
.opt.reveal  { background:var(--blue-pale); border-color:var(--blue-light);  color:var(--blue-dark); font-weight:600; }

/* ── Feedback ── */
.feedback {
  border-radius:clamp(10px,2.5vw,14px);
  padding:clamp(11px,3vw,14px) clamp(14px,4vw,18px);
  margin-top:clamp(0.75rem,2vw,1rem);
  font-size:clamp(14px,3.5vw,16px);
  font-weight:600;
  line-height:1.5;
}
.feedback.correct { background:var(--green-bg); color:var(--green-text); border:1.5px solid var(--green-border); }
.feedback.wrong   { background:var(--red-bg);   color:var(--red-text);   border:1.5px solid var(--red-border); }

/* ── Next button ── */
.next-btn {
  width:100%;
  margin-top:clamp(0.75rem,2vw,1rem);
  background:var(--blue-mid);
  color:#fff;
  border:none;
  border-radius:clamp(10px,2.5vw,14px);
  padding:clamp(13px,3.5vw,16px);
  font-size:clamp(15px,4vw,17px);
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.15s;
  letter-spacing:0.02em;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.next-btn:hover  { background:var(--blue-dark); }
.next-btn:active { transform:scale(0.98); }

/* ── Result ── */
.result {
  background:#fff;
  border:1.5px solid var(--blue-border);
  border-radius:var(--radius-lg);
  padding:clamp(1.75rem,5vw,2.5rem) clamp(1rem,4vw,1.5rem) clamp(1.5rem,4vw,2rem);
  text-align:center;
  box-shadow:0 3px 0 var(--blue-border);
}
.result-stars  { font-size:clamp(28px,7vw,38px); letter-spacing:4px; margin-bottom:0.5rem; }
.result-icon   { font-size:clamp(52px,14vw,68px); display:block; margin-bottom:0.6rem; }
.result-title  { font-size:clamp(22px,6vw,30px); font-weight:800; color:var(--blue-dark); margin-bottom:10px; line-height:1.2; }
.result-praise { font-size:clamp(14px,3.5vw,17px); color:var(--blue-mid); font-weight:500; margin-bottom:1.5rem; line-height:1.65; padding:0 clamp(0,2vw,0.5rem); }
.result-score-box {
  background:var(--blue-pale);
  border:1.5px solid var(--blue-border);
  border-radius:clamp(14px,3vw,18px);
  padding:clamp(1rem,3vw,1.25rem) clamp(1.5rem,5vw,2.5rem);
  margin:0 auto 1.25rem;
  display:block;
  width:fit-content;
  max-width:100%;
}
.result-num  { font-size:clamp(44px,12vw,58px); font-weight:800; color:var(--blue-mid); line-height:1; }
.result-pct  { font-size:clamp(13px,3.5vw,16px); color:var(--blue-light); margin-top:4px; font-weight:600; }
.result-msg  { font-size:clamp(13px,3.5vw,16px); color:#444441; margin-bottom:1.75rem; line-height:1.7; padding:0 clamp(0,2vw,0.5rem); }
.restart {
  background:var(--blue-mid);
  color:#fff;
  border:none;
  border-radius:clamp(10px,2.5vw,14px);
  padding:clamp(13px,3.5vw,15px) 40px;
  font-size:clamp(15px,4vw,17px);
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.15s;
  display:block;
  width:100%;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.restart:hover  { background:var(--blue-dark); }
.restart:active { transform:scale(0.98); }

/* ── Tablet / desktop tweaks ── */
@media (min-width:600px) {
  .opt:hover:not(:disabled) { transform:translateX(4px); }
  .next-btn:hover { transform:translateY(-1px); }
  .restart:hover  { transform:translateY(-1px); }
}

/* ── Large screens: center nicely ── */
@media (min-width:900px) {
  body { display:flex; align-items:flex-start; justify-content:center; padding-top:2.5rem; }
}
</style>

    <div class="side" style="text-align:right;">
      <div class="lbl">Kérdés</div>
      <div style="display:flex;align-items:baseline;gap:4px;justify-content:flex-end;">
        <div class="val" id="q-num">1</div>
        <div class="sub-val">/ 12</div>
      </div>
    </div>
  </div>

  <div class="prog-row">
    <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">0%</div>
  </div>

  <div class="streak" id="streak-row">🔥 <span id="streak-count">0</span> helyes egymás után — szuper vagy!</div>

  <div id="quiz-area"></div>
</div>

<script>
const pairs = [
  {en:"What's up?",        hu:"Mi újság? / Hogy vagy?",      wrong_en:["Hang on.","Take care.","No way!"],             wrong_hu:["Várj egy kicsit.","Nyugi. / Lazíts.","Vigyázz magadra!"]},
  {en:"Hang on.",          hu:"Várj egy kicsit.",             wrong_en:["Come on!","Never mind.","Take it easy."],      wrong_hu:["Csak vicceltem.","Dehogy!","Rajtad múlik."]},
  {en:"No way!",           hu:"Dehogy! / Nem hiszem el!",     wrong_en:["Guess what?","It's up to you.","Come on!"],    wrong_hu:["Mindegy.","Ugyan már!","Képzeld!"]},
  {en:"Come on!",          hu:"Ugyan már! / Na gyere!",       wrong_en:["Never mind.","Take care.","How's it going?"],  wrong_hu:["Mindegy.","Ne törődj vele.","Hogy megy?"]},
  {en:"Take it easy.",     hu:"Nyugi. / Lazíts.",             wrong_en:["It doesn't matter.","Hang on.","Guess what?"], wrong_hu:["Csak vicceltem.","Vigyázz magadra!","Rajtad múlik."]},
  {en:"I'm just kidding.", hu:"Csak vicceltem.",              wrong_en:["It's up to you.","Take care.","What's up?"],   wrong_hu:["Képzeld!","Mindegy.","Ne törődj vele."]},
  {en:"It doesn't matter.",hu:"Mindegy. / Nem számít.",       wrong_en:["Never mind.","Come on!","How's it going?"],    wrong_hu:["Várj egy kicsit.","Hogy megy?","Ugyan már!"]},
  {en:"How's it going?",   hu:"Hogy megy? / Hogy vagy?",      wrong_en:["Take care.","Guess what?","No way!"],          wrong_hu:["Vigyázz magadra!","Rajtad múlik.","Csak vicceltem."]},
  {en:"Take care.",        hu:"Vigyázz magadra!",             wrong_en:["Hang on.","Never mind.","It's up to you."],    wrong_hu:["Ne törődj vele.","Képzeld!","Dehogy!"]},
  {en:"Never mind.",       hu:"Ne törődj vele. / Mindegy.",   wrong_en:["Take it easy.","What's up?","Come on!"],       wrong_hu:["Nyugi. / Lazíts.","Rajtad múlik.","Hogy megy?"]},
  {en:"It's up to you.",   hu:"Rajtad múlik.",                wrong_en:["How's it going?","I'm just kidding.","Guess what?"],wrong_hu:["Képzeld!","Várj egy kicsit.","Csak vicceltem."]},
  {en:"Guess what?",       hu:"Képzeld!",                     wrong_en:["Take care.","No way!","Hang on."],             wrong_hu:["Mindegy.","Vigyázz magadra!","Dehogy!"]},
  {en:"My treat!",         hu:"Én fizetem!",                  wrong_en:["Good job!","No way!","Take care."],            wrong_hu:["Rajtad múlik.","Képzeld!","Csak vicceltem."]},
  {en:"Good job!",         hu:"Szép munka! / Jól csináltad!", wrong_en:["My treat!","Come on!","Hang on."],             wrong_hu:["Én fizetem!","Ugyan már!","Várj egy kicsit."]},
  {en:"Long time no see!", hu:"Rég láttalak!",                wrong_en:["What's up?","Take it easy.","Guess what?"],    wrong_hu:["Hogy megy?","Csak vicceltem.","Képzeld!"]},
  {en:"Be careful!",       hu:"Légy óvatos!",                 wrong_en:["Take care.","Never mind.","Come on!"],         wrong_hu:["Vigyázz magadra!","Ne törődj vele.","Rajtad múlik."]},
  {en:"That's amazing!",   hu:"Ez fantasztikus!",             wrong_en:["Good job!","No way!","My treat!"],             wrong_hu:["Szép munka!","Dehogy!","Én fizetem!"]},
  {en:"I have no idea.",   hu:"Fogalmam sincs.",              wrong_en:["Never mind.","It doesn't matter.","Hang on."], wrong_hu:["Ne törődj vele.","Mindegy.","Várj egy kicsit."]},
];

const praise_correct = [
  "Igen, pontosan! Nagyszerű! 🎉",
  "Helyes! Látszik, hogy figyelsz! 👏",
  "Bravó! Ezt tudtad! ⭐",
  "Tökéletes! Így tovább! 💪",
  "Igen! Egyre jobban megy! 🌟",
  "Helyes! Büszke lehetsz magadra! 😊",
  "Remek! Szuper vagy! 🏆",
];
const praise_streak = [
  "🔥 {n} egymás után — te egy igazi sztár vagy!",
  "🚀 {n} helyes! Senki sem állíthat meg!",
  "⚡ {n} sorozat! Elképesztő tempó!",
  "🌟 {n} egymás után — fantasztikus!",
];
const results = [
  {min:100,icon:"🏆",title:"TÖKÉLETES EREDMÉNY!",stars:"⭐⭐⭐⭐⭐",
   praise:"Hihetetlen! 12-ből 12 — ez nem véletlen, ez TUDÁS! Te már profi szinten beszélsz angolul! Büszke lehetsz magadra, komolyan!",
   msg:"Osztd meg az eredményed! Hadd lássák mások, milyen keményen dolgoztál! 🎊"},
  {min:80,icon:"🌟",title:"Fantasztikus teljesítmény!",stars:"⭐⭐⭐⭐",
   praise:"Wow! Ez egy igazán kiemelkedő eredmény! Látszik rajtad a fejlődés, és ez büszkeséggel tölthet el!",
   msg:"Még egy kis gyakorlás, és a 100% is meglesz! Már majdnem ott vagy! 💫"},
  {min:60,icon:"👍",title:"Nagyon jól ment!",stars:"⭐⭐⭐",
   praise:"Szuper munka! Rengeteg kifejezést ismersz már — ez komoly teljesítmény! Minden egyes kör közelebb visz a folyékony angol beszédhez!",
   msg:"Próbáld meg még egyszer — biztosan jobb lesz! Te ezt meg tudod csinálni! 💪"},
  {min:40,icon:"💪",title:"Jó haladás!",stars:"⭐⭐",
   praise:"Ne csüggedj — tanulni azt jelenti, hogy néha hibázunk! Minden helyes válasz egy lépés előre, és te már sok lépést tettél ma!",
   msg:"Még egy kör, és meglátod a különbséget! Az ismétlés a tudás anyja! 📚"},
  {min:0,icon:"😊",title:"Csak bátran, ez az eleje!",stars:"⭐",
   praise:"Minden nagy tudás kis lépésekkel kezdődik — és te ma megtettéd az első lépéseket! Ez már önmagában csodálatos!",
   msg:"Játssz még egyszer — garantálom, hogy jobban fog menni! A lényeg, hogy ne add fel! 🌱"},
];

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}
let questions,cur,score,streak,answered;

function buildQuestions(){
  return shuffle(pairs).slice(0,12).map(p=>{
    const dir=Math.random()<0.5?'en2hu':'hu2en';
    if(dir==='en2hu'){
      const opts=shuffle([p.hu,...shuffle(p.wrong_hu).slice(0,3)]);
      return {q:p.en,type:'en2hu',opts,ans:opts.indexOf(p.hu)};
    }else{
      const opts=shuffle([p.en,...shuffle(p.wrong_en).slice(0,3)]);
      return {q:p.hu,type:'hu2en',opts,ans:opts.indexOf(p.en)};
    }
  });
}

function init(){questions=buildQuestions();cur=0;score=0;streak=0;answered=false;render();}

function render(){
  document.getElementById('score-display').textContent=score;
  document.getElementById('q-num').textContent=Math.min(cur+1,questions.length);
  const pct=Math.round(cur/questions.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=pct+'%';
  const sr=document.getElementById('streak-row');
  if(streak>=2){sr.style.display='block';document.getElementById('streak-count').textContent=streak;}
  else sr.style.display='none';
  if(cur>=questions.length){showResult();return;}
  const q=questions[cur];
  const badge=q.type==='en2hu'?'🇬🇧 Mit jelent angolul?':'Hogy mondják angolul?';
  const hint=q.type==='en2hu'?'Válaszd ki a helyes magyar jelentést!':'Válaszd ki a helyes angol kifejezést!';
  document.getElementById('quiz-area').innerHTML=`
    <div class="q-card">
      <div class="q-type-badge">${badge}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-hint">${hint}</div>
      <div class="options" id="opts"></div>
      <div id="feedback"></div>
    </div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="next()">${cur===questions.length-1?'Eredmény megtekintése ✨':'Következő kérdés →'}</button>
  `;
  const opts=document.getElementById('opts');
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';b.textContent=o;b.onclick=()=>answer(i);
    opts.appendChild(b);
  });
}

function answer(chosen){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const btns=document.querySelectorAll('.opt');
  const fb=document.getElementById('feedback');
  btns.forEach(b=>b.disabled=true);
  btns[q.ans].classList.add('correct');
  if(chosen===q.ans){
    score++;streak++;
    document.getElementById('score-display').textContent=score;
    if(streak>=2){
      document.getElementById('streak-row').style.display='block';
      document.getElementById('streak-count').textContent=streak;
    }
    fb.className='feedback correct';
    fb.textContent=streak>=3
      ? praise_streak[Math.floor(Math.random()*praise_streak.length)].replace('{n}',streak)
      : praise_correct[Math.floor(Math.random()*praise_correct.length)];
  }else{
    streak=0;
    btns[chosen].classList.add('wrong');
    btns[q.ans].classList.add('reveal');
    fb.className='feedback wrong';
    fb.innerHTML='Nem ez volt — de ez is tanulás! ✨ A helyes válasz: <strong>'+q.opts[q.ans]+'</strong>';
    document.getElementById('streak-row').style.display='none';
  }
  document.getElementById('next-btn').style.display='block';
}

function next(){cur++;answered=false;render();}

function showResult(){
  const pct=Math.round(score/questions.length*100);
  const r=results.find(x=>pct>=x.min);
  document.getElementById('quiz-area').innerHTML=`
    <div class="result">
      <div class="result-stars">${r.stars}</div>
      <span class="result-icon">${r.icon}</span>
      <div class="result-title">${r.title}</div>
      <div class="result-praise">${r.praise}</div>
      <div class="result-score-box">
        <div class="result-num">${score} / ${questions.length}</div>
        <div class="result-pct">${pct}% helyes válasz</div>
      </div>
      <div class="result-msg">${r.msg}</div>
      <button class="restart" onclick="init()">🔄 Újra játszom!</button>
    </div>
  `;
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-label').textContent='100%';
  document.getElementById('q-num').textContent=questions.length;
  document.getElementById('streak-row').style.display='none';
}

init();
</script>
</body>
</html>
